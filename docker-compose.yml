version: '3.8'

services:
  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  estore:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: estore
    ports:
      - "5045:8080"
    depends_on:
      - ollama
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - OLLAMA_URL=http://ollama:11434
      - ConnectionStrings__SQL=Data Source=/app/data/localapp.db
    volumes:
      - app_data:/app/data
    restart: unless-stopped

volumes:
  ollama_data:
  app_data:
